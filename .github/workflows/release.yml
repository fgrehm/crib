name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  tests:
    uses: ./.github/workflows/test.yml

  release:
    name: GoReleaser
    needs: tests
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Extract release notes from CHANGELOG.md
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          # Extract everything between ## [VERSION] and the next ## [
          awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" \
            CHANGELOG.md | sed '/[^[:space:]]/,$!d' > /tmp/release-notes.md
          # Fail early if no release notes found for this version.
          if [ ! -s /tmp/release-notes.md ] || ! grep -q '[^[:space:]]' /tmp/release-notes.md; then
            echo "::error::No release notes found for version ${VERSION} in CHANGELOG.md"
            exit 1
          fi

      - uses: goreleaser/goreleaser-action@e24998b8b67b290c2fa8b7c14fcfa7de2c5c9b8c # v7.1.0
        with:
          version: "~> v2"
          args: release --clean --release-notes /tmp/release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update stable branch
        run: |
          git push origin HEAD:refs/heads/stable --force
