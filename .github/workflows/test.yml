name: Tests

on:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    name: Unit tests & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install gotestfmt
        run: go install github.com/gotesttools/gotestfmt/v2/cmd/gotestfmt@latest
      - name: Unit tests
        run: set -euo pipefail && make test 2>&1 | tee /tmp/gotest.log | gotestfmt
        env:
          GO_TEST_FLAGS: -json
      - name: Lint
        run: make lint
      - name: Check formatting
        run: |
          go tool golangci-lint fmt ./...
          git diff --exit-code
      - name: Complexity gate (gocyclo -over 30)
        run: |
          out=$(go tool gocyclo -over 30 -ignore '_test\.go$' . || true)
          if [ -n "$out" ]; then
            echo "Functions exceeding complexity threshold of 30:"
            echo "$out"
            exit 1
          fi
      - name: Dead code gate
        run: make deadcode
      - name: govulncheck
        run: go tool govulncheck ./...

  e2e-podman:
    name: E2E tests (Podman)
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install gotestfmt
        run: go install github.com/gotesttools/gotestfmt/v2/cmd/gotestfmt@latest
      - name: Start podman daemon
        run: |
          podman system service -t 0 &
          sleep 2
      - name: Integration tests
        run: set -euo pipefail && make test-integration 2>&1 | tee /tmp/gotest.log | gotestfmt
        env:
          CRIB_RUNTIME: podman
          GO_TEST_FLAGS: -json
      - name: E2E tests
        run: set -euo pipefail && make test-e2e 2>&1 | tee /tmp/gotest.log | gotestfmt
        env:
          CRIB_RUNTIME: podman
          GO_TEST_FLAGS: -json

  e2e-docker:
    name: E2E tests (Docker)
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install gotestfmt
        run: go install github.com/gotesttools/gotestfmt/v2/cmd/gotestfmt@latest
      - name: Verify Docker is available
        run: docker info
      - name: Integration tests
        run: set -euo pipefail && make test-integration 2>&1 | tee /tmp/gotest.log | gotestfmt
        env:
          CRIB_RUNTIME: docker
          GO_TEST_FLAGS: -json
      - name: E2E tests
        run: set -euo pipefail && make test-e2e 2>&1 | tee /tmp/gotest.log | gotestfmt
        env:
          CRIB_RUNTIME: docker
          GO_TEST_FLAGS: -json
