name: Tests

on:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    name: Unit tests & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: gotesttools/gotestfmt-action@v2
      - name: Unit tests
        run: make test | gotestfmt
        env:
          GO_TEST_FLAGS: -json
      - name: Lint
        run: make lint
      - name: Complexity gate (gocyclo -over 30)
        run: |
          out=$(go tool gocyclo -over 30 -ignore '_test\.go$' .)
          if [ -n "$out" ]; then
            echo "Functions exceeding complexity threshold of 30:"
            echo "$out"
            exit 1
          fi
      - name: Dead code gate
        run: make deadcode

  e2e-podman:
    name: E2E tests (Podman)
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: gotesttools/gotestfmt-action@v2
      - name: Start podman daemon
        run: |
          podman system service -t 0 &
          sleep 2
      - name: Integration tests
        run: make test-integration | gotestfmt
        env:
          CRIB_RUNTIME: podman
          GO_TEST_FLAGS: -json
      - name: E2E tests
        run: make test-e2e | gotestfmt
        env:
          CRIB_RUNTIME: podman
          GO_TEST_FLAGS: -json

  e2e-docker:
    name: E2E tests (Docker)
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: gotesttools/gotestfmt-action@v2
      - name: Verify Docker is available
        run: docker info
      - name: Integration tests
        run: make test-integration | gotestfmt
        env:
          CRIB_RUNTIME: docker
          GO_TEST_FLAGS: -json
      - name: E2E tests
        run: make test-e2e | gotestfmt
        env:
          CRIB_RUNTIME: docker
          GO_TEST_FLAGS: -json
