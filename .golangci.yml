version: "2"

run:
  timeout: 3m

linters:
  enable:
    - copyloopvar
    - errcheck
    - errorlint
    - gocritic
    - govet
    - ineffassign
    - intrange
    - modernize
    - staticcheck
    - unused
    - usetesting
  settings:
    gocritic:
      disabled-checks:
        # Flags intentional new-slice-from-append patterns
        # (e.g. allFiles := append(src[:len(src):len(src)], extra))
        - appendAssign
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
