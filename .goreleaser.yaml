version: 2

project_name: crib

builds:
  - main: .
    binary: crib
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X 'github.com/fgrehm/crib/cmd.version={{ .Version }}'
      - -X 'github.com/fgrehm/crib/cmd.commit={{ .ShortCommit }}'
      - -X 'github.com/fgrehm/crib/cmd.date={{ .Date }}'

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

release:
  github:
    owner: fgrehm
    name: crib
  footer: |
    **Full Changelog**: https://fgrehm.github.io/crib/reference/changelog/
